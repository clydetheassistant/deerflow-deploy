# DeerFlow configuration for mac-server.local
# Managed by: Paperclip IT Manager (MAN-152)
config_version: 7

log_level: info

token_usage:
  enabled: false

# ============================================================================
# Models — Claude via OAuth token
# Set ANTHROPIC_API_KEY env var to the Claude OAuth token value
# ============================================================================
models:
  - name: claude-sonnet
    display_name: Claude Sonnet 4.6
    use: deerflow.models.claude_provider:ClaudeChatModel
    model: claude-sonnet-4-6
    default_request_timeout: 600.0
    max_retries: 2
    max_tokens: 16000
    supports_vision: true

  - name: claude-haiku
    display_name: Claude Haiku 4.5
    use: deerflow.models.claude_provider:ClaudeChatModel
    model: claude-haiku-4-5-20251001
    default_request_timeout: 300.0
    max_retries: 2
    max_tokens: 8192

# ============================================================================
# Tool Groups
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# Tools
# ============================================================================
tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: deerflow.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: deerflow.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

tool_search:
  enabled: false

# ============================================================================
# Uploads
# ============================================================================
uploads:
  auto_convert_documents: false
  pdf_converter: auto

# ============================================================================
# Sandbox — local with bash access (approved MAN-152)
# ============================================================================
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: true
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000

# ============================================================================
# Skills
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# Title generation
# ============================================================================
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization
# ============================================================================
summarization:
  enabled: true
  model_name: claude-haiku
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564

# ============================================================================
# Memory
# ============================================================================
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

agents_api:
  enabled: false
skill_evolution:
  enabled: false

# ============================================================================
# Checkpointer — SQLite for persistence across restarts
# ============================================================================
checkpointer:
  type: sqlite
  connection_string: checkpoints.db

# ============================================================================
# IM Channels — Telegram (bot token set via TELEGRAM_BOT_TOKEN env var)
# ============================================================================
channels:
  langgraph_url: http://langgraph:2024
  gateway_url: http://gateway:8001
  session:
    assistant_id: lead_agent
    config:
      recursion_limit: 100
    context:
      thinking_enabled: true
      is_plan_mode: false
      subagent_enabled: false
  telegram:
    enabled: true
    bot_token: $TELEGRAM_BOT_TOKEN
    allowed_users: []
