# DeerFlow deployment for mac-server.local
# MAN-152 | Routing: Traefik on dokploy-network (same as openclaw/paperclip)
#
# Build source: bytedance/deer-flow via git submodule at ./deer-flow
# Config: ./config/config.yaml and ./config/extensions_config.json (committed, no secrets)
# Secrets: set in Dokploy env vars (ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN, etc.)

services:
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    volumes:
      - ./deer-flow/docker/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - LANGGRAPH_UPSTREAM=${LANGGRAPH_UPSTREAM:-langgraph:2024}
      - LANGGRAPH_REWRITE=${LANGGRAPH_REWRITE:-/}
    command: >
      sh -c "envsubst '$$LANGGRAPH_UPSTREAM $$LANGGRAPH_REWRITE'
      < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deerflow.rule=Host(`deerflow.mac-server.local`)"
      - "traefik.http.routers.deerflow.entrypoints=web"
      - "traefik.http.services.deerflow.loadbalancer.server.port=2026"
    networks:
      - deerflow-internal
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./deer-flow
      dockerfile: frontend/Dockerfile
      target: prod
    container_name: deer-flow-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
      - DEER_FLOW_INTERNAL_LANGGRAPH_BASE_URL=http://langgraph:2024
    networks:
      - deerflow-internal
    restart: unless-stopped

  gateway:
    build:
      context: ./deer-flow
      dockerfile: backend/Dockerfile
    container_name: deer-flow-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers ${GATEWAY_WORKERS:-4}"
    volumes:
      - ./config.yaml:/app/backend/config.yaml:ro
      - ./extensions_config.json:/app/backend/extensions_config.json:ro
      - ./deer-flow/skills:/app/skills:ro
      - deerflow-data:/app/backend/.deer-flow
      - langgraph-api:/app/backend/.langgraph_api
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${HOME:-/root}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:-/root}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=http://langgraph:2024
      - DEER_FLOW_CHANNELS_GATEWAY_URL=http://gateway:8001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deerflow-internal
    restart: unless-stopped

  langgraph:
    build:
      context: ./deer-flow
      dockerfile: backend/Dockerfile
    container_name: deer-flow-langgraph
    command: sh -c 'cd /app/backend && touch .env && mkdir -p .deer-flow && { uv run langgraph dev --no-browser --no-reload --host 0.0.0.0 --port 2024 --n-jobs-per-worker ${LANGGRAPH_JOBS_PER_WORKER:-10} 2>&1; echo "[exited with $$?]"; } | tee -a .deer-flow/langgraph.log'
    volumes:
      - ./config.yaml:/app/backend/config.yaml:ro
      - ./extensions_config.json:/app/backend/extensions_config.json:ro
      - deerflow-data:/app/backend/.deer-flow
      - ./deer-flow/skills:/app/skills:ro
      - langgraph-api:/app/backend/.langgraph_api
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${HOME:-/root}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:-/root}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deerflow-internal
    restart: unless-stopped

  logviewer:
    image: nginx:alpine
    container_name: deer-flow-logviewer
    volumes:
      - deerflow-data:/srv/deerflow-data:ro
      - ./nginx-logviewer/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deerflow-logs.rule=Host(`deerflow-logs.mac-server.local`)"
      - "traefik.http.routers.deerflow-logs.entrypoints=web"
      - "traefik.http.services.deerflow-logs.loadbalancer.server.port=80"
    networks:
      - deerflow-internal
      - dokploy-network
    restart: unless-stopped

volumes:
  deerflow-data:
  langgraph-api:

networks:
  deerflow-internal:
    driver: bridge
  dokploy-network:
    external: true
