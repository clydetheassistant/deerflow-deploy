server {
    listen 80 default_server;
    server_name _;
    root /srv;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;
    charset utf-8;
    default_type text/plain;
    types {
        text/plain log out err txt;
        text/html  html;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
